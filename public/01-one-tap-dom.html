<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Google One Tap + Backend</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />

    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #user {
        display: none;
        text-align: center;
      }

      img {
        border-radius: 50%;
      }

      h2 {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <main class="container">
      <h2>Login with Google</h2>

      <!-- Fallback button -->
      <div id="googleBtn"></div>

      <!-- User info -->
      <div id="user">
        <img id="avatar" width="80" />
        <h3 id="name"></h3>
        <p id="email"></p>
        <button onclick="logout()">Logout</button>
      </div>
    </main>

    <script>
      const CLIENT_ID = "141961932626-3o5089pbjc7stqj2q13id15npf7lnukj.apps.googleusercontent.com";

      function waitForGoogle(callback) {
        const interval = setInterval(() => {
          if (window.google && google.accounts && google.accounts.id) {
            clearInterval(interval);
            callback();
          }
        }, 100);
      }

      window.onload = () => {
        const savedUser = localStorage.getItem("user");

        waitForGoogle(() => {
          // Initialize Google
          google.accounts.id.initialize({
            client_id: CLIENT_ID,
            callback: handleCredentialResponse,
          });

          // Always render button
          google.accounts.id.renderButton(document.getElementById("googleBtn"), {
            theme: "outline",
            size: "large",
            text: "continue_with",
          });

          if (savedUser) {
            const user = JSON.parse(savedUser);
            renderUser(user);

            // Prevent One Tap if user already exists
            google.accounts.id.cancel();
          } else {
            // Show One Tap
            google.accounts.id.prompt();
          }
        });
      };

      // Handle login response
      async function handleCredentialResponse(response) {
        try {
          const res = await fetch("/auth/google", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              credential: response.credential,
            }),
          });

          const user = await res.json();

          // ⚠️ Not secure for production (demo only)
          localStorage.setItem("user", JSON.stringify(user));

          renderUser(user);
        } catch (err) {
          console.error("Login error:", err);
        }
      }

      function renderUser(user) {
        document.getElementById("user").style.display = "block";
        document.getElementById("googleBtn").style.display = "none";

        document.getElementById("name").textContent = user.name;
        document.getElementById("email").textContent = user.email;
        document.getElementById("avatar").src = user.picture;
      }

      function logout() {
        localStorage.removeItem("user");

        if (window.google) {
          google.accounts.id.disableAutoSelect();
        }

        location.reload();
      }
    </script>
  </body>
</html>
