<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login con Google</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: white;
      }

      .card {
        background: white;
        color: #333;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 320px;
      }

      #user {
        display: none;
        margin-top: 20px;
      }

      img {
        border-radius: 50%;
      }

      button {
        margin-top: 10px;
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #e53935;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Iniciar sesión</h2>

      <!-- 🔘 CONTENEDOR DEL BOTÓN -->
      <div id="googleBtn"></div>

      <!-- 👤 USER -->
      <div id="user">
        <img id="avatar" width="80" />
        <h3 id="name"></h3>
        <p id="email"></p>
        <button onclick="logout()">Cerrar sesión</button>
      </div>
    </div>

    <script>
      const CLIENT_ID = "207256185739-kq1gne78c00m52e6sf693d3io5pmkf34.apps.googleusercontent.com";

      function waitForGoogle(cb) {
        const interval = setInterval(() => {
          if (window.google && google.accounts && google.accounts.id) {
            clearInterval(interval);
            cb();
          }
        }, 100);
      }

      window.addEventListener("DOMContentLoaded", () => {
        waitForGoogle(() => {
          // 🔧 Inicializar SIEMPRE
          google.accounts.id.initialize({
            client_id: CLIENT_ID,
            callback: handleCredentialResponse,
          });

          // 🔘 Renderizar botón SIEMPRE
          google.accounts.id.renderButton(document.getElementById("googleBtn"), {
            theme: "outline",
            size: "large",
            text: "continue_with",
          });

          const savedUser = localStorage.getItem("user");

          if (savedUser) {
            const user = JSON.parse(savedUser);
            renderUser(user);

            google.accounts.id.cancel();
          } else {
            google.accounts.id.prompt();
          }
        });
      });

      async function handleCredentialResponse(response) {
        const res = await fetch("/auth/google", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            credential: response.credential,
          }),
        });

        const user = await res.json();

        localStorage.setItem("user", JSON.stringify(user));

        renderUser(user);
      }

      function renderUser(user) {
        document.getElementById("user").style.display = "block";
        document.getElementById("googleBtn").style.display = "none";

        document.getElementById("name").textContent = user.name;
        document.getElementById("email").textContent = user.email;
        document.getElementById("avatar").src = user.picture;
      }

      function logout() {
        localStorage.removeItem("user");

        google.accounts.id.disableAutoSelect();

        location.reload();
      }

      function showOneTap() {
        google.accounts.id.prompt((notification) => {
          console.log(notification);

          if (notification.isNotDisplayed()) {
            alert("Google no quiso mostrar el One Tap");
          }

          if (notification.isSkippedMoment()) {
            alert("El usuario lo bloqueó temporalmente");
          }

          if (notification.isDismissedMoment()) {
            alert("Fue cerrado previamente");
          }
        });
      }
    </script>

    <button onclick="showOneTap()">Mostrar One Tap</button>
  </body>
</html>
