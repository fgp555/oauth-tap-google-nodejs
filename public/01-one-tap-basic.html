<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Google One Tap + Backend</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />

    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #user {
        display: none;
        text-align: center;
      }

      img {
        border-radius: 50%;
      }

      h2 {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <main class="container">
      <h2>Login with Google</h2>
      <div id="googleBtn"></div>
      <pre id="out"></pre>
      <button onclick="logout()">logout</button>
    </main>

    <script>
      const CLIENT_ID = "141961932626-3o5089pbjc7stqj2q13id15npf7lnukj.apps.googleusercontent.com";
      // const CLIENT_ID = "207256185739-kq1gne78c00m52e6sf693d3io5pmkf34.apps.googleusercontent.com";

      function waitForGoogle(callback) {
        const interval = setInterval(() => {
          console.log("setInterval");
          if (window.google && google.accounts && google.accounts.id) {
            clearInterval(interval);
            callback();
          }
        }, 100);
      }

      function renderGoogleButton() {
        const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

        // outline | filled_blue | filled_black
        const theme = isDark ? "filled_black" : "outline";

        const container = document.getElementById("googleBtn");

        // limpiar antes de renderizar
        container.innerHTML = "";

        google.accounts.id.renderButton(container, {
          theme, // outline | filled_blue | filled_black
          size: "large", // small | medium | large
          shape: "pill", // rectangular | pill | circle | square
          text: "continue_with", // signin_with | signup_with | continue_with
          width: 250, // 👈 importante para diseño
        });
      }

      window.onload = () => {
        const savedUser = localStorage.getItem("user");

        waitForGoogle(() => {
          google.accounts.id.initialize({
            client_id: CLIENT_ID,
            callback: handleCredentialResponse,
          });

          renderGoogleButton();

          if (savedUser) {
            console.log("savedUser if", savedUser);

            google.accounts.id.cancel();
          } else {
            console.log("savedUser else", savedUser);
            google.accounts.id.prompt();
          }
        });
      };

      function parseJwt(token) {
        const base64Url = token.split(".")[1];
        const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");

        const jsonPayload = decodeURIComponent(
          atob(base64)
            .split("")
            .map((char) => "%" + ("00" + char.charCodeAt(0).toString(16)).slice(-2))
            .join(""),
        );

        return JSON.parse(jsonPayload);
      }

      async function handleCredentialResponse(response) {
        try {
          const userData = parseJwt(response.credential);
          console.log("userData", userData);
          document.querySelector("#out").textContent = JSON.stringify(userData, null, 2);
        } catch (err) {
          console.error("Login error:", err);
        }
      }

      function logout() {
        localStorage.removeItem("user");
        location.reload();
      }
    </script>
  </body>
</html>
