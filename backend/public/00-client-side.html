<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Google One Tap - client-side</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  </head>

  <body>
    <main class="container">
      <div id="googleBtn"></div>
      <pre id="out-pre"></pre>
      <button onclick="logout()">logout</button>
    </main>

    <script>
      const CLIENT_ID = "141961932626-3o5089pbjc7stqj2q13id15npf7lnukj.apps.googleusercontent.com";

      function waitForGoogle(callback) {
        const interval = setInterval(() => {
          console.log("setInterval");
          if (window.google && google.accounts && google.accounts.id) {
            clearInterval(interval);
            callback();
          }
        }, 100);
      }

      function renderGoogleButton() {
        const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

        // outline | filled_blue | filled_black
        const theme = isDark ? "filled_black" : "outline";

        const container = document.getElementById("googleBtn");

        // limpiar antes de renderizar
        container.innerHTML = "";

        google.accounts.id.renderButton(container, {
          theme, // outline | filled_blue | filled_black
          size: "large", // small | medium | large
          shape: "pill", // rectangular | pill | circle | square
          text: "continue_with", // signin_with | signup_with | continue_with
          width: 250, // 👈 importante para diseño
        });
      }

      function renderData(user) {
        document.querySelector("#out-pre").textContent = JSON.stringify(user, null, 2);

        // opcional: ocultar botón
        document.getElementById("googleBtn").style.display = "none";
      }

      window.onload = () => {
        const savedUser = localStorage.getItem("user");

        waitForGoogle(() => {
          google.accounts.id.initialize({
            client_id: CLIENT_ID,
            callback: handleCredentialResponse,
            auto_select: false, // evita login automático agresivo
          });

          renderGoogleButton();

          if (savedUser) {
            const user = JSON.parse(savedUser);
            renderData(user);

            // 🔥 no mostrar One Tap si ya hay sesión
            google.accounts.id.cancel();
          } else {
            google.accounts.id.prompt();
          }
        });
      };

      function parseJwt(token) {
        const base64Url = token.split(".")[1];
        const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");

        const jsonPayload = decodeURIComponent(
          atob(base64)
            .split("")
            .map((char) => "%" + ("00" + char.charCodeAt(0).toString(16)).slice(-2))
            .join(""),
        );

        return JSON.parse(jsonPayload);
      }

      async function handleCredentialResponse(response) {
        try {
          const userData = parseJwt(response.credential);

          // 💾 guardar usuario
          localStorage.setItem("user", JSON.stringify(userData));

          renderData(userData);

          // 🚫 evitar que vuelva a mostrar One Tap
          google.accounts.id.cancel();
        } catch (err) {
          console.error("Login error:", err);
        }
      }

      function logout() {
        localStorage.removeItem("user");

        // 🔥 esto evita auto login silencioso
        google.accounts.id.disableAutoSelect();

        location.reload();
      }
    </script>
  </body>
</html>
